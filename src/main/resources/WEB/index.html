<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebLogic Assistant</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --text-main: #1f2a44;
            --text-soft: #5f6f94;
            --border-soft: #d7e0f2;
            --panel: rgba(255, 255, 255, .88);
            --panel-2: rgba(255, 255, 255, .95);
            --user: #7a3ff2;
            --accent: #7a3ff2;
        }

        html, body { margin: 0; height: 100%; }
        body {
            font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            background: #e6f4ff;
            overflow: hidden;
        }

        #chat-container {
            width: min(980px, 92vw);
            height: 100vh;
            margin: 0 auto;
            padding: 2rem 0 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .title { margin: 0; color: #1f2a44; font-size: clamp(1.45rem, 1.1rem + 1.4vw, 2.15rem); }
        .subtitle { margin: 0; font-size: .88rem; color: var(--text-soft); }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem;
            border: 1px solid var(--border-soft);
            border-radius: 1rem;
            background: var(--panel);
            box-shadow: 0 14px 35px rgba(84, 103, 152, .16), inset 0 1px 0 rgba(255,255,255,.9);
            backdrop-filter: blur(10px);
        }

        #input-container {
            margin: 0;
            border: 1px solid var(--border-soft);
            border-radius: 999px;
            background: var(--panel-2);
            padding: .4rem;
            box-shadow: 0 15px 35px rgba(0,0,0,.4);
        }

        #suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: .5rem;
            margin-bottom: .2rem;
        }

        .suggestion-chip {
            border: 1px solid var(--border-soft);
            background: rgba(255,255,255,.92);
            color: #2d3b61;
            border-radius: 999px;
            padding: .4rem .75rem;
            font-size: .82rem;
            cursor: pointer;
            transition: all .15s ease;
        }

        .suggestion-chip:hover {
            border-color: #b3c4ea;
            background: #f3f7ff;
        }

        #user-input.input {
            border: 0;
            box-shadow: none;
            background: transparent;
            color: #1f2a44;
            padding-left: .9rem;
        }
        #user-input.input::placeholder { color: #8a98bc; }
        #user-input.input:focus { box-shadow: none; }

        #send-button.button {
            border: 0;
            border-radius: 999px;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            padding-inline: 1.1rem;
        }

        .message { margin-bottom: 1rem; background: transparent; display: flex; }
        .message.user { justify-content: flex-end; }
        .message.assistant { justify-content: flex-start; }
        .bubble { max-width: 70%; border-radius: 1em; padding: .95em 1.2em; }
        .message.user .bubble {
            background: var(--user);
            color: #fff;
            line-height: 1.4;
            box-shadow: 0 10px 24px rgba(129, 41, 176, .35);
        }
        .message.assistant .bubble {
            background: rgba(255,255,255,.96);
            border: 1px solid #dbe4f5;
            color: var(--text-main);
            line-height: 1.6;
        }
        .message.assistant .bubble p { margin-bottom: .75em; }
        .message.assistant .bubble ul,
        .message.assistant .bubble ol { margin-left: 0; padding-left: 1.25em; }
        .message.assistant .bubble li { margin-bottom: .5em; }
        .message.assistant .bubble pre {
            margin: 1em 0;
            padding: 1em;
            border-radius: .5em;
            overflow-x: auto;
            background: #f3f6ff;
            color: #243252;
        }

        .inline-action-link {
            display: block;
            width: 100%;
            text-align: left;
            border: 1px dashed #c9d8f7;
            background: #f7faff;
            color: #32487a;
            border-radius: .6em;
            padding: .45em .65em;
            margin-top: .45em;
            cursor: pointer;
            font-size: .88rem;
        }

        .inline-action-link:hover {
            background: #edf4ff;
            border-color: #a9c0ee;
        }

        @media (max-width: 768px) {
            #chat-container { width: 94vw; padding-top: 1.1rem; padding-bottom: .75rem; }
            .bubble { max-width: 88%; }
            #chat-box { padding: .9rem; }
        }
    </style>
</head>
<body>
<div id="chat-container">
    <div>
        <h1 class="title">WebLogic Assistant</h1>
    </div>
    <div id="chat-box"></div>
    <div id="suggestions" aria-label="Suggested prompts"></div>
    <div id="input-container" class="field has-addons">
        <div class="control is-expanded">
            <input id="user-input" class="input" type="text" placeholder="Type your message..." />
        </div>
        <div class="control">
            <button id="send-button" class="button is-primary">Send</button>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendButton = document.getElementById('send-button');
    const suggestionsBox = document.getElementById('suggestions');
    const suggestionPrompts = [
        'List all managed domains',
        'Show domain overview',
        'Is my domain on latest patches?',
        'Show recommended patches',
        'Start all servers',
        'Stop all servers',
        'List deployed applications'
    ];
    const initialWelcomeMessage = "Hello! I'm here to help you manage and diagnose your WebLogic Server environment. Whether you need to troubleshoot a specific Service Request (SR), deploy an application, or apply a patch recommendation, I’ve got you covered. Just provide the domain details or describe the issue you're seeing, and we'll dive right in.";
    let summary = '';
    let taskContext = null;
    let assistantReady = false;

    function setInputEnabled(enabled) {
        userInput.disabled = !enabled;
        sendButton.disabled = !enabled;
    }

    function normalizeTaskContext(value) {
        if (!value) return null;

        if (typeof value === 'object' && !Array.isArray(value)) {
            return value;
        }

        if (typeof value === 'string') {
            try {
                const parsed = JSON.parse(value);
                if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
                    if (parsed.taskContext && typeof parsed.taskContext === 'object' && !Array.isArray(parsed.taskContext)) {
                        return parsed.taskContext;
                    }
                    return parsed;
                }
            } catch (_) {
                return null;
            }
        }

        return null;
    }

    function mergeTaskContext(previous, incoming) {
        const prev = normalizeTaskContext(previous) || {};
        const next = normalizeTaskContext(incoming) || {};

        const merged = { ...prev, ...next };

        // Keep sticky domain/server/host context unless explicitly replaced with a non-empty value.
        if ((!next.targetDomain || String(next.targetDomain).trim() === '') && prev.targetDomain) {
            merged.targetDomain = prev.targetDomain;
        }
        if ((!next.targetServers || String(next.targetServers).trim() === '') && prev.targetServers) {
            merged.targetServers = prev.targetServers;
        }
        if ((!next.targetHosts || String(next.targetHosts).trim() === '') && prev.targetHosts) {
            merged.targetHosts = prev.targetHosts;
        }
        if ((!next.hostPids || typeof next.hostPids !== 'object' || Array.isArray(next.hostPids)) && prev.hostPids) {
            merged.hostPids = prev.hostPids;
        } else if (prev.hostPids && next.hostPids && typeof next.hostPids === 'object' && !Array.isArray(next.hostPids)) {
            merged.hostPids = { ...prev.hostPids, ...next.hostPids };
        }

        clearEphemeralTaskContextField(merged, next, 'pendingIntent');
        clearEphemeralTaskContextField(merged, next, 'lastAssistantQuestion');

        if (!Object.prototype.hasOwnProperty.call(next, 'awaitingFollowUp') || next.awaitingFollowUp == null) {
            delete merged.awaitingFollowUp;
        }

        return Object.keys(merged).length ? merged : null;
    }

    function clearEphemeralTaskContextField(merged, next, fieldName) {
        if (!Object.prototype.hasOwnProperty.call(next, fieldName)) {
            delete merged[fieldName];
            return;
        }

        const value = next[fieldName];
        if (value == null || (typeof value === 'string' && value.trim() === '')) {
            delete merged[fieldName];
        }
    }

    function appendMessage(text, sender) {
        const row = document.createElement('div');
        row.className = `message ${sender}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        const renderedText = sender === 'assistant' ? stripServerStartBoilerplate(text) : text;
        bubble[sender === 'assistant' ? 'innerHTML' : 'textContent'] = sender === 'assistant' ? marked.parse(renderedText) : renderedText;

        if (sender === 'assistant') {
            const actionLines = extractActionableLines(renderedText);
            actionLines.forEach(line => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'inline-action-link';
                button.textContent = line;
                button.title = 'Click to send this request again';
                button.addEventListener('click', () => sendPrompt(line));
                bubble.appendChild(button);
            });
        }

        row.appendChild(bubble);
        chatBox.appendChild(row);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function extractActionableLines(text) {
        if (!text || typeof text !== 'string') return [];

        const lines = text
            .split('\n')
            .map(line => line.replace(/^[-*\d.\s]+/, '').trim())
            .filter(Boolean);

        const seen = new Set();
        const actions = [];
        const pattern = /(track\s+async\s+job\s+status|list\s+all\s+managed\s+domains|show\s+domain\s+overview|list\s+pending\s+patches|show\s+recommended\s+patches|start\s+all\s+servers|stop\s+all\s+servers|start\s+server|stop\s+server|list\s+deployed\s+applications|job\s+status|track\s+job|track\s+async)/i;

        for (const line of lines) {
            if (line.length > 220) continue;
            if (!pattern.test(line)) continue;
            if (seen.has(line.toLowerCase())) continue;
            seen.add(line.toLowerCase());
            actions.push(line);
        }

        const derivedTrackingAction = deriveTrackingActionFromMetadata(text);
        if (derivedTrackingAction && !seen.has(derivedTrackingAction.toLowerCase())) {
            seen.add(derivedTrackingAction.toLowerCase());
            actions.push(derivedTrackingAction);
        }

        return actions;
    }

    function deriveTrackingActionFromMetadata(text) {
        if (!text || typeof text !== 'string') return null;

        const hostMatch = text.match(/\bHost\s*:\s*([^\n\r]+)/i);
        const pidMatch = text.match(/\bPID\s*:\s*([^\n\r]+)/i);

        const host = hostMatch ? String(hostMatch[1] || '').trim() : '';
        const pid = pidMatch ? String(pidMatch[1] || '').trim() : '';

        if (!host || !pid) return null;
        return `Track async job status for PID ${pid} on host ${host}`;
    }

    function stripServerStartBoilerplate(text) {
        if (!text || typeof text !== 'string') return text;

        const lines = text.split('\n');
        const filtered = lines.filter(line => {
            const normalized = String(line || '').trim().toLowerCase();
            if (!normalized) return true;

            return !(
                normalized.startsWith("i've initiated the process to start all servers")
                || normalized.startsWith("i have initiated the process to start all servers")
                || normalized.startsWith("the job has been started with the following tracking information")
                || normalized.startsWith("the operation has been triggered with the following tracking information")
            );
        });

        return filtered.join('\n').replace(/\n{3,}/g, '\n\n').trim();
    }

    async function sendPrompt(text) {
        if (!assistantReady) return;
        const prompt = (text || '').trim();
        if (!prompt) return;
        appendMessage(prompt, 'user');
        await requestAssistantMessage(prompt);
    }

    function renderSuggestions() {
        suggestionsBox.innerHTML = '';
        suggestionPrompts.forEach(prompt => {
            const chip = document.createElement('button');
            chip.type = 'button';
            chip.className = 'suggestion-chip';
            chip.textContent = prompt;
            chip.title = 'Click to send this prompt';
            chip.addEventListener('click', () => {
                if (!assistantReady) return;
                sendPrompt(prompt);
            });
            suggestionsBox.appendChild(chip);
        });
    }

    async function sendMessage() {
        if (!assistantReady) return;

        const text = userInput.value.trim();
        if (!text) {
            return;
        }

        appendMessage(text, 'user');
        userInput.value = '';

        await requestAssistantMessage(text);
    }

    async function requestAssistantMessage(text) {
        try {
            const payload = {
                message: text,
                summary: typeof summary === 'string' ? summary : ''
            };

            const normalizedTaskContext = mergeTaskContext(taskContext, taskContext);
            if (normalizedTaskContext) {
                payload.taskContext = normalizedTaskContext;
            }

            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();
            summary = typeof data.summary === 'string' ? data.summary : summary;
            taskContext = mergeTaskContext(taskContext, data.taskContext);
            appendMessage(data.message || '_[No response]_ 🤖', 'assistant');

            if (!assistantReady && text === '') {
                assistantReady = true;
                setInputEnabled(true);
            }
        } catch (_) {
            appendMessage('_[Error contacting assistant]_ ❌', 'assistant');

            if (!assistantReady && text === '') {
                assistantReady = true;
                setInputEnabled(true);
            }
        }
    }

    sendButton.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

    appendMessage(initialWelcomeMessage, 'assistant');
    renderSuggestions();
    assistantReady = true;
    setInputEnabled(true);
</script>
</body>
</html>
