<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebLogic Assistant</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --text-main: #1f2a44;
            --text-soft: #5f6f94;
            --border-soft: #d7e0f2;
            --panel: rgba(255, 255, 255, .88);
            --panel-2: rgba(255, 255, 255, .95);
            --user: #7a3ff2;
            --accent: #7a3ff2;
        }

        html, body { margin: 0; height: 100%; }
        body {
            font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            background: #e6f4ff;
            overflow: hidden;
        }

        #chat-container {
            width: min(980px, 92vw);
            height: 100vh;
            margin: 0 auto;
            padding: 2rem 0 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .title { margin: 0; color: #1f2a44; font-size: clamp(1.45rem, 1.1rem + 1.4vw, 2.15rem); }
        .subtitle { margin: 0; font-size: .88rem; color: var(--text-soft); }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem;
            border: 1px solid var(--border-soft);
            border-radius: 1rem;
            background: var(--panel);
            box-shadow: 0 14px 35px rgba(84, 103, 152, .16), inset 0 1px 0 rgba(255,255,255,.9);
            backdrop-filter: blur(10px);
        }

        #input-container {
            margin: 0;
            border: 1px solid var(--border-soft);
            border-radius: 999px;
            background: var(--panel-2);
            padding: .4rem;
            box-shadow: 0 15px 35px rgba(0,0,0,.4);
        }

        #user-input.input {
            border: 0;
            box-shadow: none;
            background: transparent;
            color: #1f2a44;
            padding-left: .9rem;
        }
        #user-input.input::placeholder { color: #8a98bc; }
        #user-input.input:focus { box-shadow: none; }

        #send-button.button {
            border: 0;
            border-radius: 999px;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            padding-inline: 1.1rem;
        }

        .message { margin-bottom: 1rem; background: transparent; display: flex; }
        .message.user { justify-content: flex-end; }
        .message.assistant { justify-content: flex-start; }
        .bubble { max-width: 70%; border-radius: 1em; padding: .95em 1.2em; }
        .message.user .bubble {
            background: var(--user);
            color: #fff;
            line-height: 1.4;
            box-shadow: 0 10px 24px rgba(129, 41, 176, .35);
        }
        .message.assistant .bubble {
            background: rgba(255,255,255,.96);
            border: 1px solid #dbe4f5;
            color: var(--text-main);
            line-height: 1.6;
        }
        .message.assistant .bubble p { margin-bottom: .75em; }
        .message.assistant .bubble ul,
        .message.assistant .bubble ol { margin-left: 0; padding-left: 1.25em; }
        .message.assistant .bubble li { margin-bottom: .5em; }
        .message.assistant .bubble pre {
            margin: 1em 0;
            padding: 1em;
            border-radius: .5em;
            overflow-x: auto;
            background: #f3f6ff;
            color: #243252;
        }

        @media (max-width: 768px) {
            #chat-container { width: 94vw; padding-top: 1.1rem; padding-bottom: .75rem; }
            .bubble { max-width: 88%; }
            #chat-box { padding: .9rem; }
        }
    </style>
</head>
<body>
<div id="chat-container">
    <div>
        <h1 class="title">WebLogic Assistant</h1>
    </div>
    <div id="chat-box"></div>
    <div id="input-container" class="field has-addons">
        <div class="control is-expanded">
            <input id="user-input" class="input" type="text" placeholder="Type your message..." />
        </div>
        <div class="control">
            <button id="send-button" class="button is-primary">Send</button>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendButton = document.getElementById('send-button');
    let summary = '';

    function appendMessage(text, sender) {
        const row = document.createElement('div');
        row.className = `message ${sender}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble[sender === 'assistant' ? 'innerHTML' : 'textContent'] = sender === 'assistant' ? marked.parse(text) : text;
        row.appendChild(bubble);
        chatBox.appendChild(row);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, summary })
            });
            const data = await response.json();
            summary = data.summary;
            appendMessage(data.message || '_[No response]_ 🤖', 'assistant');
        } catch (_) {
            appendMessage('_[Error contacting assistant]_ ❌', 'assistant');
        }
    }

    sendButton.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
