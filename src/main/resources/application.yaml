server:
  host: "0.0.0.0"
  port: 8080
  features:
    static-content:
      classpath:
        - context: "/"
          location: "/WEB"
          welcome: "index.html"

declarative:
  ignore-incubating: true

agent-features:
  domain-runtime:
    enabled: true
  patching:
    enabled: true
  diagnostic:
    enabled: false
  app-management:
    enabled: true

agent-routing:
  latency-logging: true
  token-logging: true

langchain4j:
  ollama:
    chat-model:
      enabled: true

  providers:
    oci-gen-ai:
      base-url: https://inference.generativeai.us-ashburn-1.oci.oraclecloud.com
      compartment-id: "ocid1.compartment.oc1..aaaaaaaalb6or3fft6ch4qx6epz2se2wbghc5f2odxchp7x6qvy6umvx2taq"
      region: "us-ashburn-1"
      model-name: ocid1.generativeaimodel.oc1.iad.amaaaaaask7dceyag3w2xk76vlahjujj2gdfeuzhflt25gbo3bxidlsqfjla
