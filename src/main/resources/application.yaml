server:
  host: "0.0.0.0"
  port: 8080
  features:
    static-content:
      classpath:
        - context: "/"
          location: "/WEB"
          welcome: "index.html"

declarative:
  ignore-incubating: true

agent-features:
  domain-configuration:
    enabled: true
  domain-runtime:
    enabled: true
  patching:
    enabled: true
  diagnostic:
    enabled: true
  app-management:
    enabled: true

agent-routing:
  latency-logging: true
  token-logging: true

memory:
  provider: in-memory # supported: in-memory, redis, mongo
  max-messages: 20
  providers:
    redis:
      host: localhost
      port: 6379
      ttl-seconds: 86400
    mongo:
      uri: mongodb://localhost:27017
      database: wls_agentic
      collection: conversation_summaries

managed-domains:
  cache-refresh-seconds: 300

langchain4j:
  ollama:
    chat-model:
      enabled: true

  providers:
    oci-gen-ai:
      base-url: https://inference.generativeai.us-ashburn-1.oci.oraclecloud.com
      compartment-id: "ocid1.compartment.oc1..aaaaaaaalb6or3fft6ch4qx6epz2se2wbghc5f2odxchp7x6qvy6umvx2taq"
      region: "us-ashburn-1"
       #xai.grok-3-fast
      #model-name: ocid1.generativeaimodel.oc1.iad.amaaaaaask7dceyag3w2xk76vlahjujj2gdfeuzhflt25gbo3bxidlsqfjla
      #xai.grok-4-fast-non-reasoning 
      model-name: ocid1.generativeaimodel.oc1.iad.amaaaaaask7dceyamqkpviarwzvo3wwuhnhqloa224fneaukac5megifuaba
    open-ai:
      base-url: https://inference.generativeai.us-chicago-1.oci.oraclecloud.com/20231130/actions
      model-name: openai.gpt-oss-120b
      timeout: PT90S
      max-retries: 5

  models:
    wls-shared-model:
      provider: oci-gen-ai

  mcp-clients:
    wls-tools-mcp-server:
      uri: http://129.80.184.247:9001/wlsmcp
      


